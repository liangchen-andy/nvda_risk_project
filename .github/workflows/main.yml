---
name: main
# Automatically cancel a previous run.
concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
# yamllint disable rule:line-length
on:
  push:
    branches: [main]
  pull_request:
    branches: ['*']
jobs:
  run-tests:
    name: Run tests for ${{ matrix.os }} on Python 3.14
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Install TinyTex
        uses: r-lib/actions/setup-tinytex@v2
      - name: Install additional LaTeX packages
        run: |
          tlmgr update --self
          tlmgr install a4wide biber biblatex booktabs caption datetime doi eurosym fancyhdr fmtcount grfext microtype minibox moreverb natbib ntgclass relsize setspace units xetex xfrac xunicode
          tlmgr list --only-installed
      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.63.1
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
          activate-environment: true
          frozen: true
      - name: Install npm packages
        shell: bash {0}
        run: pixi run --frozen npm install
      - name: Run pytest on MacOS
        shell: bash {0}
        run: pixi run --frozen pytest -q
        if: runner.os == 'MacOS'
      - name: Run tests on Windows
        shell: bash {0}
        run: pixi run --frozen pytest -q
        if: runner.os == 'Windows'
      - name: Run pytest (with coverage) on Linux
        shell: bash {0}
        run: pixi run --frozen pytest -q --cov-report=xml
        if: runner.os == 'Linux'
      - name: Run diagnostics pytask subset on Linux
        shell: bash {0}
        run: pixi run --frozen pytask -k diagnostics --force
        if: runner.os == 'Linux'
      - name: Validate diagnostics quality gates on Linux
        shell: bash {0}
        if: runner.os == 'Linux'
        run: |
          pixi run --frozen python - <<'PY'
          import pandas as pd
          from pathlib import Path

          diagnostics_path = Path("bld/metrics/diagnostics.csv")
          if not diagnostics_path.exists():
              raise SystemExit("Missing diagnostics artifact: bld/metrics/diagnostics.csv")

          diagnostics = pd.read_csv(diagnostics_path)
          if diagnostics.empty or not {"check", "value"}.issubset(diagnostics.columns):
              raise SystemExit("Diagnostics artifact is malformed.")

          diagnostics_map = dict(zip(diagnostics["check"], diagnostics["value"], strict=True))
          all_pass = str(diagnostics_map.get("quality_gates_all_pass", "False")).strip().lower()
          failed_checks = diagnostics_map.get("quality_gates_failed_checks", "unknown")
          if all_pass != "true":
              raise SystemExit(
                  "Diagnostics quality gates did not pass. "
                  f"quality_gates_failed_checks={failed_checks}"
              )
          PY
      - name: Run volatility pytask subset on Linux
        shell: bash {0}
        run: pixi run --frozen pytask -k volatility
        if: runner.os == 'Linux'
      - name: Upload diagnostics artifacts
        uses: actions/upload-artifact@v7
        if: runner.os == 'Linux'
        with:
          name: diagnostics-artifacts
          path: |
            bld/metrics/diagnostics.csv
            documents/tables/diagnostics.md
      - name: Upload coverage reports
        uses: codecov/codecov-action@v5
        if: runner.os == 'Linux'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
  run-docs:
    name: Run docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.63.1
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
          activate-environment: true
          frozen: true
      - name: Build docs
        shell: bash {0}
        run: pixi run docs
      - name: Check validity of URLs
        shell: bash {0}
        run: pixi run check-urls
